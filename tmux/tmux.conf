# Auto-rebalance panes when one is added or removed so they always
# split the available space evenly. `select-layout -E` re-spreads
# panes within the current preset (even-vertical / even-horizontal /
# main-*); it does the right thing whether the latest split was
# vertical or horizontal.
set-hook -g after-split-window 'select-layout -E'
set-hook -g pane-exited 'select-layout -E'
set-hook -g after-kill-pane 'select-layout -E'

# Mouse scroll → pane scrollback. Without `mouse on`, the wheel scrolls
# the terminal's outer scrollback (which is empty inside tmux) instead
# of the pane's history. tmux 2.1+ handles wheel-to-copy-mode automatically
# when this is on.
set -g mouse on

# Bigger scrollback buffer per pane (default 2000 is small for long
# Claude sessions — long outputs vanish off the top quickly when three
# panes share the screen). 50k lines ~ a few MB per pane.
set -g history-limit 50000

# Active-pane indicator: border + per-pane title strip.
# Border colors only — don't touch pane backgrounds, since apps that
# do their own theming (e.g. Claude Code) clash visibly with a tinted
# tmux background.
#   - Inactive border: dim gray, thin line.
#   - Active border:   peach (colour215), bold, heavy double line so the
#                      active pane reads at a glance even on small splits.
set -g pane-border-lines heavy
set -g pane-border-style 'fg=colour240'
set -g pane-active-border-style 'fg=colour215,bold'
# Title strip above each pane: pane index + running command. Active
# pane's strip inherits the peach border color above for redundant signal.
set -g pane-border-status top
set -g pane-border-format ' #P: #{pane_current_command} '

# Status bar at the bottom: charcoal background so it fades into chrome
# instead of clashing with the peach accent on the active pane. Off-white
# text for general window listings; peach for the active window so the
# accent stays consistent top + bottom.
set -g status-style 'bg=colour235,fg=colour250'
set -g window-status-current-style 'fg=colour215,bold'

# Prefix: Ctrl-Space (default Ctrl-b is an awkward left-hand chord).
# `send-prefix` rebind lets a double-tap pass the literal Ctrl-Space
# through to the underlying app when needed.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Auto-rebalance panes when one is added or removed so they always
# split the available space evenly. `select-layout -E` re-spreads
# panes within the current preset (even-vertical / even-horizontal /
# main-*); it does the right thing whether the latest split was
# vertical or horizontal.
set-hook -g after-split-window 'select-layout -E'
set-hook -g pane-exited 'select-layout -E'
set-hook -g after-kill-pane 'select-layout -E'

# Mouse scroll → pane scrollback. Without `mouse on`, the wheel scrolls
# the terminal's outer scrollback (which is empty inside tmux) instead
# of the pane's history. tmux 2.1+ handles wheel-to-copy-mode automatically
# when this is on.
set -g mouse on

# Forward tmux selections to the host terminal clipboard via OSC 52, so a
# drag inside a pane copies just that pane to the macOS clipboard (Ghostty
# / iTerm2 / WezTerm support OSC 52). Without this, a terminal-level drag
# spans all vertical splits because the terminal sees one flat grid.
set -g set-clipboard on

# Tell tmux the outer terminal supports the OSC 52 clipboard escape, even
# when terminfo lacks the Ms capability. Without this, set-clipboard on is
# a no-op and selections never reach the macOS clipboard.
set -ag terminal-overrides ",*:Ms=\E]52;c;%p2%s\a"

# vi-style copy-mode bindings (v = start visual select, V = line, y = yank).
# Mostly useful as a keyboard fallback when the mouse can't reach the
# region cleanly — and required for the per-binding overrides below.
set -g mode-keys vi

# Mouse-drag copy semantics. Override the default MouseDragEnd1Pane to
# also pipe through pbcopy as a belt-and-braces backup for OSC 52 (some
# terminals truncate OSC 52 payloads at ~74K). We use copy-pipe-and-cancel
# (not copy-pipe-no-clear) so copy-mode exits immediately after release —
# tmux selections only exist inside copy-mode, so keeping the highlight
# visible would also trap keystrokes (you'd have to press Escape before
# typing into Claude). Verify the copy by pasting.
bind-key -T copy-mode-vi MouseDragEnd1Pane \
  send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi y \
  send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter \
  send-keys -X copy-pipe-and-cancel "pbcopy"

# Double-click → select word under pointer; triple-click → select whole
# line. Both pipe to pbcopy + OSC 52 then exit copy-mode.
bind-key -T copy-mode-vi DoubleClick1Pane \
  select-pane \; \
  send-keys -X select-word \; \
  send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi TripleClick1Pane \
  select-pane \; \
  send-keys -X select-line \; \
  send-keys -X copy-pipe-and-cancel "pbcopy"

# Prefix + p → paste from the macOS clipboard. (`]` still pastes the
# most recent tmux buffer; this is the explicit "give me pbpaste"
# binding for when the tmux buffer is stale or you copied from outside
# tmux.)
bind p run-shell "pbpaste | tmux load-buffer - && tmux paste-buffer"

# Bigger scrollback buffer per pane (default 2000 is small for long
# Claude sessions — long outputs vanish off the top quickly when three
# panes share the screen). 50k lines ~ a few MB per pane.
set -g history-limit 50000

# Active-pane indicator: border + per-pane title strip.
# Border colors only — don't touch pane backgrounds, since apps that
# do their own theming (e.g. Claude Code) clash visibly with a tinted
# tmux background.
#   - Inactive border: dim gray, thin line.
#   - Active border:   peach (colour215), bold, heavy double line so the
#                      active pane reads at a glance even on small splits.
set -g pane-border-lines heavy
set -g pane-border-style 'fg=colour240'
set -g pane-active-border-style 'fg=colour215,bold'
# Title strip above each pane: pane index + running command. Active
# pane's strip inherits the peach border color above for redundant signal.
set -g pane-border-status top
set -g pane-border-format ' #P: #{pane_current_command} '

# Status bar at the bottom: charcoal background so it fades into chrome
# instead of clashing with the peach accent on the active pane. Off-white
# text for general window listings; peach for the active window so the
# accent stays consistent top + bottom.
set -g status-style 'bg=colour235,fg=colour250'
set -g window-status-current-style 'fg=colour215,bold'

# Prefix: Ctrl-Space (default Ctrl-b is an awkward left-hand chord).
# `send-prefix` rebind lets a double-tap pass the literal Ctrl-Space
# through to the underlying app when needed.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix
